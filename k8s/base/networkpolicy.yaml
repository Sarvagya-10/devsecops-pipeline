---
# Default-deny: nothing in the namespace can talk in or out unless allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: devsecops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow:
#   - inbound HTTP from ingress-nginx and from other pods in this namespace
#   - outbound DNS to kube-system
#   - outbound HTTPS for OS package + image base health (mostly for kubectl exec debugging)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devsecops-demo-allow
  namespace: devsecops
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: devsecops-demo
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
