apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devsecops

resources:
  - namespace.yaml
  - configmap.yaml
  # RBAC bundle (separate Kustomization at k8s/rbac/)
  - ../rbac
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - networkpolicy.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: devsecops-pipeline

# Pin the image to the build the pipeline most recently pushed to ECR.
# Bump newTag whenever the pipeline produces a build you want to deploy.
# Avoids reliance on the mutable :latest tag (Sonar rule kubernetes:S6596).
images:
  - name: 649966627060.dkr.ecr.us-east-1.amazonaws.com/devsecops-demo
    newTag: "7"
