apiVersion: v1
kind: ServiceAccount
metadata:
  name: devsecops-demo-sa
  namespace: devsecops
  labels:
    app.kubernetes.io/name: devsecops-demo
    app.kubernetes.io/part-of: devsecops-pipeline
# The SA itself does not auto-mount its token. The deployment can opt in by
# setting automountServiceAccountToken: true at the pod spec if the app
# starts needing in-cluster API access.
automountServiceAccountToken: false
