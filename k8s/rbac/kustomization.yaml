apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# RBAC bundle for the devsecops-demo app. Referenced as a directory from
# k8s/base/kustomization.yaml (Kustomize allows directory-level references
# anywhere but blocks individual file references outside the base root).

namespace: devsecops

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
