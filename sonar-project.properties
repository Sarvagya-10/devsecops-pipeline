# SonarQube Scanner configuration
# Run from the repo root. Jenkinsfile passes SONAR_HOST_URL and SONAR_TOKEN
# as environment variables; this file declares the project-shape inputs.

# --- Project identification ---
sonar.projectKey=devsecops-demo
sonar.projectName=devsecops-demo
sonar.projectVersion=0.1.0

# --- What to analyze ---
sonar.sources=app/src
sonar.tests=app/tests

# --- Python-specific ---
sonar.python.version=3.12
sonar.python.coverage.reportPaths=app/coverage.xml
sonar.python.xunit.reportPath=app/test-results.xml

# --- What to ignore ---
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/.pytest_cache/**,**/htmlcov/**,**/site-packages/**

# --- Misc ---
sonar.sourceEncoding=UTF-8
